model = "gpt-5.4"
model_reasoning_effort = "high"
project_doc_fallback_filenames = ["CLAUDE.md"]
hide_agent_reasoning = true
approval_policy = "on-request"
sandbox_mode = "workspace-write"
notify = ["bash", "-lc", "afplay /System/Library/Sounds/Ping.aiff"]
personality = "pragmatic"
plan_mode_reasoning_effort = "high"
approvals_reviewer = "guardian_subagent"

[agents]
max_threads = 6
max_depth = 1

[features]
apps = true
default_mode_request_user_input = true
js_repl = true
prevent_idle_sleep = true
responses_websockets_v2 = true
multi_agent = true
image_detail_original = true
guardian_approval = true

[mcp_servers.Serena]
command = "uvx"
args = [
  "--from",
  "git+https://github.com/oraios/serena",
  "serena",
  "start-mcp-server",
  "--context",
  "codex",
  "--project",
  "$(pwd)"
]
startup_timeout_sec = 60

[mcp_servers.ChromeDevtools]
command = "npx"
args = ["chrome-devtools-mcp@latest"]

[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = ["--app", "desktop"]

[projects."/Users/piory/git/github.com/Piory/ghosgent"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/ROOT4-BEAUTY/r4-beauty"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/keita-keita-keita/mobic-buy"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/ROOT4-BEAUTY/alpha-server"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/ROOT4-BEAUTY/alpha-client"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/ROOT4-BEAUTY/kaminote"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/Piory/dotfiles"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/keita-keita-keita/yuipoke"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/yu-dot-limited/mirai-teracy"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/yu-dot-limited/pos_system"]
trust_level = "trusted"

[projects."/Users/piory/git/github.com/mishima-shokai-lab/hozen-kun"]
trust_level = "trusted"

[projects."/"]
trust_level = "trusted"

[notice]
hide_rate_limit_model_nudge = true

[tui]
notification_condition = "always"
status_line = [
  "codex-version",
  "model-with-reasoning",
  "context-used",
  "weekly-limit",
  "five-hour-limit"
]
theme = "dracula"

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true
